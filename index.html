<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kids&Us Lesson Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#FAFAF7;color:#3C3C3B;min-height:100vh}
    header{background:#3C3C3B;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;color:#FFD600;position:sticky;top:0;z-index:100}
    .btn{padding:12px 20px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:800;font-family:'Nunito',sans-serif;transition:all 0.2s}
    .sm{width:32px;height:32px;border-radius:8px;border:1px solid #eee;background:#fafafa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
    .sm.active{background:#3C3C3B;color:#FFD600;border-color:#3C3C3B}
    #loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);z-index:1000;flex-direction:column;align-items:center;justify-content:center}
    .spinner{width:32px;height:32px;border:3px solid #f3f3f3;border-top:3px solid #FFD600;border-radius:50%;animation:sp .8s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 15px rgba(0,0,0,0.05);margin-top:20px}
</style>
</head>
<body>

<header>
    <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;background:#FFD600;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#3C3C3B;font-weight:900">K</div>
        <h1 style="font-size:16px;font-weight:900">Planner</h1>
    </div>
</header>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:12px;font-weight:800">ELABORAZIONE...</p>
</div>

<div style="padding:16px;max-width:500px;margin:0 auto">
    <div style="display:flex;gap:8px;margin-bottom:20px">
        <button id="b-babies" class="sm active" onclick="setG('babies')">👶 Babies</button>
        <button id="b-kids" class="sm" onclick="setG('kids')">👦 Kids</button>
    </div>

    <div style="background:#fff;border-radius:20px;padding:30px;text-align:center;border:1px solid #f0f0f0">
        <div style="font-size:40px;margin-bottom:15px">📚</div>
        <h2 style="font-size:18px;font-weight:900">Nuova Lezione</h2>
        <p style="font-size:13px;color:#888;margin-bottom:20px">Carica PDF o Foto</p>
        
        <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none">
        <button class="btn" onclick="document.getElementById('fileInput').click()" style="background:#FFD600;color:#3C3C3B;width:100%">
            📸 CARICA GUIDA
        </button>
    </div>

    <div id="result" class="card" style="display:none"></div>
</div>

<script>
let group = 'babies';
const colors = { babies: '#FFD600', kids: '#00AEEF' };

function setG(g) {
    group = g;
    document.querySelectorAll('.sm').forEach(b => b.classList.remove('active'));
    document.getElementById('b-' + g).classList.add('active');
}

document.getElementById('fileInput').onchange = async function(e) {
    const file = e.target.files[0];
    if(!file) return;

    document.getElementById('loading').style.display = 'flex';
    const reader = new FileReader();
    
    reader.onload = async function() {
        const base64 = reader.result.split(',')[1];
        const isPdf = file.type === 'application/pdf';

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20241022",
                    messages: [{
                        role: "user",
                        content: [
                            { type: isPdf ? "document" : "image", source: { type: "base64", media_type: isPdf ? "application/pdf" : "image/png", data: base64 } },
                            { type: "text", text: "Estrai le attività della lezione Kids&Us. Rispondi SOLO con un array JSON: [ { \"name\": \"...\", \"duration\": 5, \"description\": \"...\", \"targetLanguage\": \"...\" } ]" }
                        ]
                    }]
                })
            });

            const data = await response.json();
            const activities = JSON.parse(data.content[0].text.match(/\[[\s\S]*\]/)[0]);
            render(activities);
        } catch (err) {
            alert("Errore: " + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    };
    reader.readAsDataURL(file);
};

function render(acts) {
    const res = document.getElementById('result');
    res.style.display = 'block';
    let time = 0;
    let html = `<h3 style="margin-bottom:15px;color:${colors[group]}">Scheda Lezione</h3>`;
    
    acts.forEach(a => {
        html += `<div style="margin-bottom:15px;padding-bottom:10px;border-bottom:1px solid #eee">
            <div style="display:flex;gap:10px">
                <b style="color:${colors[group]};width:40px">${time}'</b>
                <div>
                    <b style="font-size:14px">${a.name}</b>
                    <p style="font-size:12px;color:#666">${a.description}</p>
                    ${a.targetLanguage ? `<div style="margin-top:5px;padding:5px;background:#FFFDE7;border-left:3px solid ${colors[group]};font-size:11px"><b>Target:</b> ${a.targetLanguage}</div>` : ''}
                </div>
            </div>
        </div>`;
        time += a.duration;
    });
    res.innerHTML = html;
}
</script>
</body>
</html>
