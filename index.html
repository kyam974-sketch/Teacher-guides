<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kids&Us Lesson Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#FAFAF7;color:#3C3C3B;min-height:100vh}
header{background:#3C3C3B;padding:15px;text-align:center;color:#FFD600;position:sticky;top:0;z-index:100}
.container{padding:15px;max-width:500px;margin:0 auto}
.btn{padding:10px 20px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px}
#loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.9);z-index:1000;flex-direction:column;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:4px solid #f3f3f3;border-top:4px solid #FFD600;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* STILI TABELLA ORIGINALI */
.card{background:#fff;border-radius:18px;padding:15px;box-shadow:0 4px 15px rgba(0,0,0,0.05);margin-bottom:15px;animation:fi 0.4s ease-out}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5;align-items:baseline}
.time{font-family:monospace;font-weight:800;color:#FFD600;font-size:13px;min-width:45px}
.content{flex:1}
.target{margin-top:6px;padding:6px 10px;background:#FFFDE7;border-radius:8px;font-size:11px;border-left:3px solid #FFD600;color:#555}
</style>
</head>
<body>

<header>
    <h1 style="font-size:20px;font-weight:900">Lesson Planner</h1>
</header>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:15px;font-weight:700">Analizzando il PDF della lezione...</p>
</div>

<div class="container">
    <div style="text-align:center;margin:20px 0">
        <input type="file" id="pdfInput" accept="application/pdf" style="display:none">
        <button class="btn" onclick="document.getElementById('pdfInput').click()" style="background:#FFD600;color:#3C3C3B;box-shadow:0 4px 10px rgba(255,214,0,0.3)">
            <span style="font-size:18px">📄</span> CARICA PDF LEZIONE
        </button>
    </div>

    <div id="resultView" style="display:none">
        <div class="card" id="plannerContent"></div>
        <button class="btn" onclick="window.location.reload()" style="background:#3C3C3B;color:#fff;width:100%;justify-content:center;margin-top:10px">
            NUOVA SCANSIONE
        </button>
    </div>
</div>

<script>
document.getElementById('pdfInput').onchange = async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('loading').style.display = 'flex';
    
    const reader = new FileReader();
    reader.onload = async function() {
        const base64 = reader.result.split(',')[1];
        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20241022",
                    max_tokens: 4000,
                    messages: [{
                        role: "user",
                        content: [
                            { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64 } },
                            { type: "text", text: "Genera il planner Kids&Us in JSON. Ogni attività deve avere: name, duration, description, targetLanguage. Usa l'italiano per la descrizione." }
                        ]
                    }]
                })
            });

            const data = await response.json();
            if (data.content && data.content[0]) {
                renderPlanner(data.content[0].text);
            }
        } catch (err) {
            alert("Errore: " + err.message);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    };
    reader.readAsDataURL(file);
};

function renderPlanner(jsonText) {
    try {
        const cleanJson = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();
        const activities = JSON.parse(cleanJson);
        const container = document.getElementById('plannerContent');
        
        let html = '<h3 style="margin-bottom:15px;font-size:16px;border-bottom:2px solid #FFD600;padding-bottom:5px">Scheda Lezione</h3>';
        let currentTime = 0;

        activities.forEach(act => {
            const duration = parseInt(act.duration) || 5;
            const startTime = formatTime(currentTime);
            html += `
                <div class="row">
                    <div class="time">${startTime}</div>
                    <div class="content">
                        <b style="font-size:14px">${act.name}</b>
                        <p style="font-size:12px;color:#666;margin-top:2px">${act.description}</p>
                        ${act.targetLanguage ? `<div class="target"><b>Target:</b> ${act.targetLanguage}</div>` : ''}
                    </div>
                </div>
            `;
            currentTime += duration;
        });

        container.innerHTML = html;
        document.getElementById('resultView').style.display = 'block';
    } catch (e) {
        alert("Errore nella formattazione dei dati.");
    }
}

function formatTime(minutes) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    return `${m.toString().padStart(2, '0')}'`; // Formato Kids&Us (es. 05')
}
</script>
</body>
</html>
